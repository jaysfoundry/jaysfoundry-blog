<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F0ECE3"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#8B7E6A" stroke-width="1" opacity="0.2"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" rx="2" fill="#C44B2F"/>

  <!-- Brand name -->
  <text x="104" y="280" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="400" fill="#2C2824" letter-spacing="-0.5">Jay's Foundry</text>

  <!-- Tagline -->
  <text x="106" y="330" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#8B7E6A" letter-spacing="3" text-transform="uppercase">BUILD THINGS. SHOW THE WORK. STAY CURIOUS.</text>

  <!-- Motif strip under tagline -->
  <!-- Bar -->
  <rect x="106" y="370" width="4" height="16" rx="2" fill="#C44B2F"/>
  <!-- Grill indicator -->
  <circle cx="126" cy="373" r="3" fill="#8B7E6A" opacity="0.4"/>
  <circle cx="136" cy="373" r="3" fill="#8B7E6A" opacity="0.4"/>
  <circle cx="146" cy="373" r="3" fill="#C44B2F" opacity="0.6"/>
  <circle cx="126" cy="383" r="3" fill="#8B7E6A" opacity="0.3"/>
  <circle cx="136" cy="383" r="3" fill="#8B7E6A" opacity="0.3"/>
  <circle cx="146" cy="383" r="3" fill="#8B7E6A" opacity="0.3"/>
  <!-- Dial -->
  <circle cx="172" cy="378" r="9" fill="none" stroke="#8B7E6A" stroke-width="1.2" opacity="0.5"/>
  <circle cx="172" cy="378" r="6" fill="#E8E3D9"/>
  <rect x="171" y="368" width="2" height="5" rx="1" fill="#C44B2F"/>
  <!-- Lines -->
  <rect x="194" y="372" width="24" height="2.5" rx="1" fill="#8B7E6A" opacity="0.4"/>
  <rect x="194" y="377" width="24" height="2.5" rx="1" fill="#8B7E6A" opacity="0.3"/>
  <rect x="194" y="382" width="24" height="2.5" rx="1" fill="#8B7E6A" opacity="0.2"/>
  <!-- Dot -->
  <circle cx="232" cy="378" r="4" fill="#C44B2F" opacity="0.5"/>
  <!-- Grill indicator 2 -->
  <circle cx="250" cy="373" r="3" fill="#8B7E6A" opacity="0.3"/>
  <circle cx="260" cy="373" r="3" fill="#8B7E6A" opacity="0.3"/>
  <circle cx="270" cy="373" r="3" fill="#8B7E6A" opacity="0.3"/>
  <circle cx="250" cy="383" r="3" fill="#8B7E6A" opacity="0.4"/>
  <circle cx="260" cy="383" r="3" fill="#8B7E6A" opacity="0.4"/>
  <circle cx="270" cy="383" r="3" fill="#C44B2F" opacity="0.6"/>
  <!-- Bar -->
  <rect x="286" y="370" width="4" height="16" rx="2" fill="#C44B2F" opacity="0.4"/>

  <!-- Scale markings icon (top right, symmetric 7-bar) -->
  <rect x="920" y="200" width="8" height="34" rx="4" fill="#8B7E6A" opacity="0.3"/>
  <rect x="944" y="188" width="8" height="46" rx="4" fill="#8B7E6A" opacity="0.4"/>
  <rect x="968" y="176" width="8" height="58" rx="4" fill="#8B7E6A" opacity="0.55"/>
  <rect x="992" y="162" width="8" height="72" rx="4" fill="#C44B2F"/>
  <rect x="1016" y="176" width="8" height="58" rx="4" fill="#8B7E6A" opacity="0.55"/>
  <rect x="1040" y="188" width="8" height="46" rx="4" fill="#8B7E6A" opacity="0.4"/>
  <rect x="1064" y="200" width="8" height="34" rx="4" fill="#8B7E6A" opacity="0.3"/>

  <!-- URL hint bottom right -->
  <text x="1120" y="580" font-family="'DM Mono', monospace" font-size="14" fill="#8B7E6A" opacity="0.6" text-anchor="end">jaysfoundry.com</text>
</svg>
